<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — Create Server</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">⚡ Create Server</div>
      <nav>
        <a href="/">Главная</a>
        <a href="/register.html">Регистрация</a>
        <a href="/login.html">Вход</a>
        <a href="/profile.html" class="active" id="profileLinkNav">Профиль</a>
      </nav>
    </header>

    <main>
      <section id="profileNotLogged" style="display:block">
        <div class="form-section">
          <h2>Необходима авторизация</h2>
          <p>Пожалуйста, <a href="/login.html">войдите</a> или <a href="/register.html">зарегистрируйтесь</a>.</p>
        </div>
      </section>

      <section id="profileLogged" style="display:none">
        <div class="profile-header">
          <div class="profile-avatar">👤</div>
          <h2 id="profileLogin">—</h2>
          <span class="profile-status" id="profileStatus">—</span>
        </div>

        <div class="profile-cards">
          <div class="card">
            <h3>UUID</h3>
            <p class="card-value mono" id="profileUuid">—</p>
          </div>
          <div class="card">
            <h3>Роль</h3>
            <p class="card-value" id="profileRole">—</p>
          </div>
          <div class="card">
            <h3>Дата регистрации</h3>
            <p class="card-value" id="profileCreated">—</p>
          </div>
          <div class="card">
            <h3>Последний вход</h3>
            <p class="card-value" id="profileLastLogin">—</p>
          </div>
          <div class="card">
            <h3>Последний IP</h3>
            <p class="card-value mono" id="profileLastIp">—</p>
          </div>
          <div class="card">
            <h3>2FA</h3>
            <p class="card-value" id="profile2fa">—</p>
          </div>
        </div>

        <button id="logoutBtn" class="btn-danger">Выйти</button>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Create Server. Все права защищены.</p>
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
